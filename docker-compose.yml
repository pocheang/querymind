services:
  neo4j:
    image: neo4j:5.26
    container_name: local-rag-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env before starting compose}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
      - neo4j_conf:/conf
  n8n:
    image: ${N8N_IMAGE:?Set N8N_IMAGE to a pinned n8n image tag before starting compose}
    container_name: local-rag-n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://localhost:5678
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: Asia/Shanghai
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  neo4j_conf:
  n8n_data:
