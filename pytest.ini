[pytest]
pythonpath = .
testpaths = tests tests/unit tests/performance
norecursedirs = .git .venv .tmp pytest_tmp_run_20260410 pytest_tmp_run_* .pytest_tmp* artifacts frontend/node_modules

# Test discovery and output
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output settings (coverage options removed - use pytest-cov separately if installed)
addopts = -v --strict-markers --tb=short

# Test markers
markers =
    unit: Unit tests for individual components
    performance: Performance and benchmark tests
    integration: Integration tests across multiple components
    slow: Tests that take significant time to run

# Temporary path retention
tmp_path_retention_policy = none
